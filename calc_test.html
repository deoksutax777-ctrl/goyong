<style>

  .panel {

  .panel-header {

  .panel-body { padding: 16px; }

  .config-row {
    display: flex; gap: 16px; align-items: end; flex-wrap: wrap; margin-bottom: 8px;
  }
  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .field-group label {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: .5px;
  }
  .field-group select, .field-group input {
    border: 1px solid var(--border); border-radius: 5px; padding: 7px 10px;
    font-family: var(--font); font-size: 13px; color: var(--text);

  .calc-table {
    width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px;
  }
  .calc-table th {
    background: #eef2fa; padding: 8px 10px; border: 1px solid var(--border);
    font-weight: 600; text-align: center; white-space: nowrap;
  }
  .calc-table th.youth-hdr { background: var(--accent2-light); color: var(--accent2); }
  .calc-table th.normal-hdr { background: #f0f2f8; color: var(--accent); }
  .calc-table td {

  /* Summary table */
  .summary-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .summary-table th {

  .result-card.highlight {

  .result-card.highlight .rc-label { color: rgba(255,255,255,.8); }

  @media print {

</style>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 공제 단가 (단위: 만원)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const RATES = {
  '중소': {
    youth:  { metro: 1450, local: 1550 },
    normal: { metro: 850,  local: 950  },
    years: 3
  },
  '중견': {
    youth:  { metro: 800, local: 800 },
    normal: { metro: 450, local: 450 },
    years: 3
  },
  '대기업': {
    youth:  { metro: 400, local: 400 },
    normal: { metro: 0,   local: 0   },
    years: 2
  }
};

let savedValues = {};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function fmt(n) { return n.toLocaleString('ko-KR'); }
function fmtD(n) { return Number.isInteger(n) ? n.toString() : n.toFixed(2); }
function getCorp() { return document.getElementById('corp-type').value; }
function getStartYear() { return parseInt(document.getElementById('start-year').value); }

function getW(year) {
  const g = (id) => { const el = document.getElementById(id); return el ? (parseFloat(el.value) || 0) : 0; };
  return { ym: g('w'+year+'-ym'), yl: g('w'+year+'-yl'), nm: g('w'+year+'-nm'), nl: g('w'+year+'-nl') };
}

function totalW(w) { return w.ym + w.yl + w.nm + w.nl; }
function youthW(w) { return w.ym + w.yl; }

function diffW(a, b) {
  return { ym: a.ym - b.ym, yl: a.yl - b.yl, nm: a.nm - b.nm, nl: a.nl - b.nl };
}

function maxZero(w) {
  return { ym: Math.max(0, w.ym), yl: Math.max(0, w.yl), nm: Math.max(0, w.nm), nl: Math.max(0, w.nl) };
}

function saveInputValues() {
  document.querySelectorAll('#input-area input[type=number]').forEach(el => {
    savedValues[el.id] = el.value;
  });
}

function restoreInputValues() {
  document.querySelectorAll('#input-area input[type=number]').forEach(el => {
    if (savedValues[el.id] !== undefined) el.value = savedValues[el.id];
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 당기공제 계산
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function calcDanggi(corp, diff) {
  const rate = RATES[corp];
  const inc = maxZero(diff);
  const amt = {
    ym: inc.ym * rate.youth.metro,
    yl: inc.yl * rate.youth.local,
    nm: inc.nm * rate.normal.metro,
    nl: inc.nl * rate.normal.local
  };
  return { inc, amt, total: amt.ym + amt.yl + amt.nm + amt.nl };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 추가공제 계산 (유지확인)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function calcAddtl(corp, danggiInc, wCheck, wPrev) {
  const rate = RATES[corp];
  // 유지 증가분 = MAX(0, 추가공제연도 - 전기)
  const kept = maxZero(diffW(wCheck, wPrev));
  // 추가공제 = MIN(당기 증가분, 유지 증가분)
  const inc = {
    ym: Math.min(danggiInc.ym, kept.ym),
    yl: Math.min(danggiInc.yl, kept.yl),
    nm: Math.min(danggiInc.nm, kept.nm),
    nl: Math.min(danggiInc.nl, kept.nl)
  };
  const amt = {
    ym: inc.ym * rate.youth.metro,
    yl: inc.yl * rate.youth.local,
    nm: inc.nm * rate.normal.metro,
    nl: inc.nl * rate.normal.local
  };
  return { kept, inc, amt, total: amt.ym + amt.yl + amt.nm + amt.nl };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 사후관리 추징 계산 (조특법 제29조의8 시행령)
// CASE A (가.㉠): 전체감소 + 청년감소≥전체감소
// CASE B (가.㉡): 전체감소 + 청년감소<전체감소
// CASE C (나.):   전체유지 + 청년만감소
// CASE D:         추징없음
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// 단일 지역 추징 기본금액 (multiplier 적용 전)
function calcRegionRaw(yRate, nRate, yDanggi, nDanggi, yChk, nChk, yDanggiInc) {
  const yDec = Math.max(0, yDanggi - yChk);
  const nDec = Math.max(0, nDanggi - nChk);
  const tDec = Math.max(0, (yDanggi + nDanggi) - (yChk + nChk));

  if (tDec <= 0 && yDec <= 0) return 0;

  // 나. CASE C: 전체 유지 + 청년만 감소
  if (tDec <= 0 && yDec > 0) {
    return Math.min(yDec, yDanggiInc) * (yRate - nRate);
  }

  // 가.㉠ CASE A: 청년감소 ≥ 전체감소
  if (yDec >= tDec) {
    const effYDec = Math.min(yDec, yDanggiInc); // 한도: 당기 청년증가
    const converted = Math.max(0, effYDec - tDec); // 전환분
    return converted * (yRate - nRate) + tDec * yRate;
  }

  // 가.㉡ CASE B: 청년감소 < 전체감소
  return Math.min(yDec, tDec) * yRate + Math.min(nDec, tDec) * nRate;
}

// 전체 추징 계산 (multiplier: 2차=1, 3차=공제횟수)
function sahuCheck(corp, wDanggi, wCheck, danggiInc, multiplier) {
  const rate = RATES[corp];
  const isSmall = (corp === '중소');

  const yDec = Math.max(0, youthW(wDanggi) - youthW(wCheck));
  const tDec = Math.max(0, totalW(wDanggi) - totalW(wCheck));

  // type 판정
  let type = 'ok';
  if (tDec > 0 && yDec >= tDec) type = 'case_a';
  else if (tDec > 0) type = 'case_b';
  else if (yDec > 0) type = 'youth_only';

  let raw = 0;
  if (type !== 'ok') {
    if (isSmall) {
      raw = calcRegionRaw(
        rate.youth.metro, rate.normal.metro,
        wDanggi.ym, wDanggi.nm, wCheck.ym, wCheck.nm, danggiInc.ym
      ) + calcRegionRaw(
        rate.youth.local, rate.normal.local,
        wDanggi.yl, wDanggi.nl, wCheck.yl, wCheck.nl, danggiInc.yl
      );
    } else {
      raw = calcRegionRaw(
        rate.youth.metro, rate.normal.metro,
        youthW(wDanggi), totalW(wDanggi) - youthW(wDanggi),
        youthW(wCheck), totalW(wCheck) - youthW(wCheck),
        danggiInc.ym + danggiInc.yl
      );
    }
    raw *= multiplier;
  }

  return { type, raw, yDec, tDec };
}

function sahuLabel(type) {
  switch(type) {
    case 'ok': return '<span class="badge badge-ok">CASE D: 정상 유지</span>';
    case 'youth_only': return '<span class="badge badge-warn">CASE C (나.): 청년만 감소</span>';
    case 'case_a': return '<span class="badge badge-danger">CASE A (가.㉠): 전체감소/청년≥전체</span>';
    case 'case_b': return '<span class="badge badge-danger">CASE B (가.㉡): 전체감소/청년&lt;전체</span>';
    default: return '-';
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// UI 구축
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initStartYearOptions() {
  const sel = document.getElementById('start-year');
  for (let y = 2020; y <= 2025; y++) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y + '년';
    if (y === 2024) opt.selected = true;
    sel.appendChild(opt);
  }
}

function onSettingsChange() {
  saveInputValues();
  buildInputTable();
  restoreInputValues();
  recalc();
}

function buildInputTable() {
  const corp = getCorp();
  const startYear = getStartYear();
  const rate = RATES[corp];
  const maxYears = rate.years;
  const isSmall = (corp === '중소');
  const hasNormal = (corp !== '대기업');

  // 연도 범위: 전기 ~ 마지막 추가공제
  const years = [];
  for (let y = startYear - 1; y <= startYear + maxYears - 1; y++) years.push(y);

  // 안내 텍스트
  const info = document.getElementById('info-text');
  info.textContent = `전기: ${startYear-1}년 → 당기: ${startYear}년 → 추가공제: ${startYear+1}~${startYear+maxYears-1}년 (${maxYears}년간)`;

  let h = '<table class="calc-table"><thead><tr>';
  h += '<th rowspan="2" style="width:160px;">연도</th>';
  h += `<th colspan="${isSmall ? 2 : 1}" class="youth-hdr">청년등</th>`;
  if (hasNormal) h += `<th colspan="${isSmall ? 2 : 1}" class="normal-hdr">청년등외</th>`;
  h += '</tr><tr>';
  h += `<th class="youth-hdr">${isSmall ? '수도권' : '전체'}</th>`;
  if (isSmall) h += '<th class="youth-hdr">비수도권</th>';
  if (hasNormal) {
    h += `<th class="normal-hdr">${isSmall ? '수도권' : '전체'}</th>`;
    if (isSmall) h += '<th class="normal-hdr">비수도권</th>';
  }
  h += '</tr></thead><tbody>';

  years.forEach((y, i) => {
    let role, bg;
    if (i === 0) { role = '전기'; bg = '#f8f9fb'; }
    else if (i === 1) { role = '당기'; bg = '#e8eef8'; }
    else { role = (i-1) + '차 추가'; bg = '#e6f4f0'; }

    h += `<tr style="background:${bg}">`;
    h += `<td class="label-cell" style="background:${bg}">`;
    h += `<strong>${y}년</strong> `;
    h += `<span class="badge badge-${i===0?'prev':i===1?'danggi':'addtl'}">${role}</span>`;
    h += '</td>';
    h += `<td><input type="number" id="w${y}-ym" step="0.01" value="0" oninput="recalc()"></td>`;
    if (isSmall) h += `<td><input type="number" id="w${y}-yl" step="0.01" value="0" oninput="recalc()"></td>`;
    if (hasNormal) {
      h += `<td><input type="number" id="w${y}-nm" step="0.01" value="0" oninput="recalc()"></td>`;
      if (isSmall) h += `<td><input type="number" id="w${y}-nl" step="0.01" value="0" oninput="recalc()"></td>`;
    }
    h += '</tr>';
  });

  h += '</tbody></table>';
  document.getElementById('input-area').innerHTML = h;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 전체 재계산
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function recalc() {
  const corp = getCorp();
  const startYear = getStartYear();
  const rate = RATES[corp];
  const maxYears = rate.years;
  const isSmall = (corp === '중소');
  const hasNormal = (corp !== '대기업');

  const prevYear = startYear - 1;
  const wPrev = getW(prevYear);
  const wDanggi = getW(startYear);
  const diff = diffW(wDanggi, wPrev);

  // 당기공제
  const danggi = calcDanggi(corp, diff);

  // 추가공제 & 사후관리 for each year
  const results = [];

  results.push({
    year: prevYear, role: '전기', roleIdx: 0,
    w: wPrev, credit: 0, addtl: null, sahu: null, chugjing: 0
  });

  results.push({
    year: startYear, role: '당기공제', roleIdx: 1,
    w: wDanggi, diff: diff, danggi: danggi,
    credit: danggi.total, addtl: null, sahu: null, chugjing: 0
  });

  for (let i = 1; i < maxYears; i++) {
    const checkYear = startYear + i;
    const wCheck = getW(checkYear);

    // 추가공제 계산 (유지확인: 확인연도 vs 전기) - 항상 계산
    const addtl = calcAddtl(corp, danggi.inc, wCheck, wPrev);
    const credit = addtl.total;

    // 사후관리 추징 계산
    let sahu, chugjing = 0, limit = 0, multiplier = 1, prevChugjing = 0;

    if (i === 1) {
      // ① 2차년도: multiplier=1, 한도=직전1년 공제세액
      multiplier = 1;
      limit = danggi.total;
      sahu = sahuCheck(corp, wDanggi, wCheck, danggi.inc, multiplier);
      chugjing = Math.min(sahu.raw, limit);
    } else if (i === 2) {
      // ② 3차년도: multiplier=직전2년 공제횟수, 한도=직전2년 공제세액합계
      const prevResult = results[results.length - 1];
      const creditCount = (danggi.total > 0 ? 1 : 0) + (prevResult.credit > 0 ? 1 : 0);
      multiplier = creditCount;
      limit = danggi.total + prevResult.credit; // 직전 2년 공제세액 합계
      prevChugjing = prevResult.chugjing; // ①에서 이미 계산한 금액
      sahu = sahuCheck(corp, wDanggi, wCheck, danggi.inc, multiplier);
      chugjing = Math.min(Math.max(0, sahu.raw - prevChugjing), limit);
    }

    results.push({
      year: checkYear, role: i + '차 추가공제', roleIdx: i + 1,
      w: wCheck, credit, addtl, sahu, chugjing,
      addtlIdx: i, limit, multiplier, prevChugjing
    });
  }

  renderSummary(results, danggi, corp);
  renderDetails(results, danggi, corp);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 요약 테이블 렌더링
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderSummary(results, danggi, corp) {
  const isSmall = (corp === '중소');
  const hasNormal = (corp !== '대기업');

  let totalCredit = 0, totalChugjing = 0;

  let h = '<table class="summary-table"><thead><tr>';
  h += '<th style="width:160px;">연도</th>';
  h += '<th>구분</th>';
  h += '<th>공제액 (만원)</th>';
  h += '<th>사후관리</th>';
  h += '<th>추징액 (만원)</th>';
  h += '<th>순공제 (만원)</th>';
  h += '</tr></thead><tbody>';

  results.forEach(r => {
    let rowClass = '';
    if (r.roleIdx === 0) rowClass = 'row-prev';
    else if (r.roleIdx === 1) rowClass = 'row-danggi';
    else rowClass = 'row-addtl';

    const net = r.credit - r.chugjing;
    totalCredit += r.credit;
    totalChugjing += r.chugjing;

    h += `<tr class="${rowClass}">`;
    h += `<td class="label-cell"><strong>${r.year}년</strong></td>`;

    if (r.roleIdx === 0) {
      h += `<td><span class="badge badge-prev">전기 (기준)</span></td>`;
      h += '<td>-</td><td>-</td><td>-</td><td>-</td>';
    } else if (r.roleIdx === 1) {
      h += `<td><span class="badge badge-danggi">당기공제</span></td>`;
      h += `<td style="font-weight:700;color:var(--accent);">${fmt(r.credit)}</td>`;
      h += '<td>-</td><td>-</td>';
      h += `<td style="font-weight:700;">${fmt(r.credit)}</td>`;
    } else {
      h += `<td><span class="badge badge-addtl">${r.role}</span></td>`;
      h += `<td style="font-weight:700;color:var(--accent2);">${fmt(r.credit)}</td>`;
      h += `<td>${r.sahu ? sahuLabel(r.sahu.type) : '-'}</td>`;
      h += `<td style="color:${r.chugjing > 0 ? 'var(--warn)' : 'inherit'};font-weight:${r.chugjing > 0 ? '700' : '400'};">${r.chugjing > 0 ? '-' + fmt(r.chugjing) : '0'}</td>`;
      h += `<td style="font-weight:700;color:${net < 0 ? 'var(--warn)' : 'inherit'};">${fmt(net)}</td>`;
    }
    h += '</tr>';
  });

  // 합계
  const grandNet = totalCredit - totalChugjing;
  h += '<tr class="row-total">';
  h += '<td class="label-cell">합계</td>';
  h += '<td></td>';
  h += `<td>${fmt(totalCredit)}</td>`;
  h += '<td></td>';
  h += `<td>${totalChugjing > 0 ? '-' + fmt(totalChugjing) : '0'}</td>`;
  h += `<td>${fmt(grandNet)}</td>`;
  h += '</tr>';

  h += '</tbody></table>';

  // 카드 요약
  h += '<div class="result-grid" style="margin-top:16px;">';
  h += resultCard('총 공제액', totalCredit, '당기 + 추가공제', 'blue');
  if (totalChugjing > 0) {
    h += resultCard('총 추징액', totalChugjing, '사후관리 추징', 'red');
  }
  h += resultCard('순 공제액 (실수령)', grandNet, totalChugjing > 0 ? '공제 - 추징' : '추징 없음', 'highlight');
  h += '</div>';

  document.getElementById('summary-area').innerHTML = h;
}

function resultCard(label, val, sub, type) {
  return `<div class="result-card ${type||''}">
    <div class="rc-label">${label}</div>
    <div class="rc-val">${fmt(val)}만원</div>
    <div class="rc-sub">${sub}</div>
  </div>`;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 상세 카드 렌더링
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderDetails(results, danggi, corp) {
  const rate = RATES[corp];
  const isSmall = (corp === '중소');
  const hasNormal = (corp !== '대기업');
  let h = '';

  results.forEach(r => {
    if (r.roleIdx === 0) return; // 전기 skip

    const cardClass = r.roleIdx === 1 ? 'card-danggi' : 'card-addtl';

    h += `<div class="detail-card ${cardClass}">`;
    h += `<div class="detail-title">`;
    h += `<strong>${r.year}년</strong> `;
    h += `<span class="badge badge-${r.roleIdx===1?'danggi':'addtl'}">${r.role}</span>`;
    if (r.sahu) h += ' ' + sahuLabel(r.sahu.type);
    h += '</div>';

    if (r.roleIdx === 1) {
      // 당기공제 상세
      h += '<div class="formula-box">';
      h += `<strong>당기공제 계산</strong> (${r.year}년 vs ${r.year-1}년)<br><br>`;
      if (isSmall) {
        h += `청년등 수도권: <code>MAX(0, ${fmtD(r.diff.ym)}) × ${fmt(rate.youth.metro)}만 = ${fmt(danggi.amt.ym)}만원</code><br>`;
        h += `청년등 비수도권: <code>MAX(0, ${fmtD(r.diff.yl)}) × ${fmt(rate.youth.local)}만 = ${fmt(danggi.amt.yl)}만원</code><br>`;
        if (hasNormal) {
          h += `청년등외 수도권: <code>MAX(0, ${fmtD(r.diff.nm)}) × ${fmt(rate.normal.metro)}만 = ${fmt(danggi.amt.nm)}만원</code><br>`;
          h += `청년등외 비수도권: <code>MAX(0, ${fmtD(r.diff.nl)}) × ${fmt(rate.normal.local)}만 = ${fmt(danggi.amt.nl)}만원</code><br>`;
        }
      } else {
        h += `청년등: <code>MAX(0, ${fmtD(r.diff.ym)}) × ${fmt(rate.youth.metro)}만 = ${fmt(danggi.amt.ym)}만원</code><br>`;
        if (hasNormal) {
          h += `청년등외: <code>MAX(0, ${fmtD(r.diff.nm)}) × ${fmt(rate.normal.metro)}만 = ${fmt(danggi.amt.nm)}만원</code><br>`;
        }
      }
      h += `<br><strong>당기공제액: <code>${fmt(danggi.total)}만원</code></strong>`;
      h += '</div>';
    } else {
      // 추가공제 상세
      if (r.addtl) {
        h += '<div class="formula-box">';
        h += `<strong>추가공제 유지확인</strong> (${r.year}년 vs ${results[0].year}년 전기)<br>`;
        h += `유지 증가분 = MAX(0, ${r.year}년 근로자 - ${results[0].year}년 전기)<br>`;
        h += `추가공제 = MIN(당기 증가분, 유지 증가분)<br><br>`;
        if (isSmall) {
          h += `청년등 수도권: <code>MIN(${fmtD(danggi.inc.ym)}, ${fmtD(r.addtl.kept.ym)}) = ${fmtD(r.addtl.inc.ym)} × ${fmt(rate.youth.metro)}만 = ${fmt(r.addtl.amt.ym)}만원</code><br>`;
          h += `청년등 비수도권: <code>MIN(${fmtD(danggi.inc.yl)}, ${fmtD(r.addtl.kept.yl)}) = ${fmtD(r.addtl.inc.yl)} × ${fmt(rate.youth.local)}만 = ${fmt(r.addtl.amt.yl)}만원</code><br>`;
          if (hasNormal) {
            h += `청년등외 수도권: <code>MIN(${fmtD(danggi.inc.nm)}, ${fmtD(r.addtl.kept.nm)}) = ${fmtD(r.addtl.inc.nm)} × ${fmt(rate.normal.metro)}만 = ${fmt(r.addtl.amt.nm)}만원</code><br>`;
            h += `청년등외 비수도권: <code>MIN(${fmtD(danggi.inc.nl)}, ${fmtD(r.addtl.kept.nl)}) = ${fmtD(r.addtl.inc.nl)} × ${fmt(rate.normal.local)}만 = ${fmt(r.addtl.amt.nl)}만원</code><br>`;
          }
        } else {
          h += `청년등: <code>MIN(${fmtD(danggi.inc.ym)}, ${fmtD(r.addtl.kept.ym)}) = ${fmtD(r.addtl.inc.ym)} × ${fmt(rate.youth.metro)}만 = ${fmt(r.addtl.amt.ym)}만원</code><br>`;
          if (hasNormal) {
            h += `청년등외: <code>MIN(${fmtD(danggi.inc.nm)}, ${fmtD(r.addtl.kept.nm)}) = ${fmtD(r.addtl.inc.nm)} × ${fmt(rate.normal.metro)}만 = ${fmt(r.addtl.amt.nm)}만원</code><br>`;
          }
        }
        h += `<br><strong>추가공제액: <code>${fmt(r.addtl.total)}만원</code></strong>`;
        h += '</div>';
      }

      // 사후관리 상세
      if (r.sahu) {
        const isWarn = r.sahu.type !== 'ok';
        const borderC = isWarn ? 'var(--warn)' : 'var(--accent2)';
        const bgC = isWarn ? '#fdf8f6' : '#f0faf6';
        const titleC = isWarn ? 'var(--warn)' : 'var(--accent2)';
        const yearLabel = r.addtlIdx === 1 ? '2차년도 ①' : '3차년도 ②';

        h += `<div class="formula-box" style="border-color:${borderC};background:${bgC};">`;
        h += `<strong style="color:${titleC};">사후관리 [${yearLabel}]</strong> (${r.year}년 vs ${results[1].year}년 당기)<br>`;

        if (r.sahu.type === 'ok') {
          h += `감소 없음 → <strong style="color:var(--accent2);">CASE D: 추징 없음</strong>`;
        } else if (r.sahu.type === 'case_a') {
          const effYDec = Math.min(r.sahu.yDec, youthW(results[1].danggi.inc));
          const converted = Math.max(0, effYDec - r.sahu.tDec);
          h += `<br>전체감소: <code>${fmtD(r.sahu.tDec)}명</code>, 청년감소: <code>${fmtD(r.sahu.yDec)}명</code> (청년감소 ≥ 전체감소)<br>`;
          h += `전환분(청년→비청년): <code>${fmtD(converted)}명</code> × (청년단가-비청년단가)`;
          if (r.multiplier > 1) h += ` × ${r.multiplier}회`;
          h += `<br>`;
          h += `이탈분: <code>${fmtD(r.sahu.tDec)}명</code> × 청년단가`;
          if (r.multiplier > 1) h += ` × ${r.multiplier}회`;
          h += `<br>`;
          h += `산출액: <code>${fmt(r.sahu.raw)}만원</code>`;
          if (r.prevChugjing > 0) h += ` - ①기공제 ${fmt(r.prevChugjing)}만`;
          h += ` (한도: ${fmt(r.limit)}만)<br>`;
          h += `<strong style="color:var(--warn);">→ 추징: <code>${fmt(r.chugjing)}만원</code></strong>`;
        } else if (r.sahu.type === 'case_b') {
          const nDec = Math.max(0, r.sahu.tDec - r.sahu.yDec);
          h += `<br>전체감소: <code>${fmtD(r.sahu.tDec)}명</code>, 청년감소: <code>${fmtD(r.sahu.yDec)}명</code>, 비청년감소: <code>${fmtD(nDec)}명</code><br>`;
          h += `청년분 × 청년단가 + 비청년분 × 비청년단가`;
          if (r.multiplier > 1) h += ` × ${r.multiplier}회`;
          h += `<br>`;
          h += `산출액: <code>${fmt(r.sahu.raw)}만원</code>`;
          if (r.prevChugjing > 0) h += ` - ①기공제 ${fmt(r.prevChugjing)}만`;
          h += ` (한도: ${fmt(r.limit)}만)<br>`;
          h += `<strong style="color:var(--warn);">→ 추징: <code>${fmt(r.chugjing)}만원</code></strong>`;
        } else if (r.sahu.type === 'youth_only') {
          h += `<br>청년감소: <code>${fmtD(r.sahu.yDec)}명</code> (전체는 유지)<br>`;
          h += `MIN(청년감소, 당기청년증가) × (청년단가 - 비청년단가)`;
          if (r.multiplier > 1) h += ` × ${r.multiplier}회`;
          h += `<br>`;
          h += `산출액: <code>${fmt(r.sahu.raw)}만원</code>`;
          if (r.prevChugjing > 0) h += ` - ①기공제 ${fmt(r.prevChugjing)}만`;
          h += ` (한도: ${fmt(r.limit)}만)<br>`;
          h += `<strong style="color:var(--warn);">→ 추징: <code>${fmt(r.chugjing)}만원</code></strong>`;
        }
        h += '</div>';
      }
    }

    h += '</div>';
  });

  document.getElementById('detail-area').innerHTML = h;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 초기화
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
initStartYearOptions();
buildInputTable();
recalc();
</script>
