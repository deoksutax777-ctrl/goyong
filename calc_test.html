<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합고용세액공제 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5; --surface: #ffffff; --surface2: #f8f9fb;
    --border: #d0d5dd; --text: #1a2332; --text-muted: #5a6a7e;
    --accent: #1a4fa8; --accent-light: #e8eef8;
    --accent2: #0e7c61; --accent2-light: #e6f4f0;
    --warn: #c0392b; --warn-light: #fdf0ee;
    --orange: #e67e22; --orange-light: #fef6e8;
    --font: 'Noto Sans KR', sans-serif; --mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 13px; min-height: 100vh; }

  .app-header {
    background: var(--accent); color: #fff; padding: 16px 32px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(26,79,168,.25);
  }
  .app-header h1 { font-size: 16px; font-weight: 600; letter-spacing: -.3px; }
  .app-header .sub { font-size: 11px; opacity: .75; margin-top: 2px; }
  .nav-btns { display: flex; gap: 8px; align-items: center; }
  .nav-btns a {
    padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    text-decoration: none; transition: all .15s;
  }
  .nav-btns a.active { background: #fff; color: var(--accent); border: 2px solid #fff; }
  .nav-btns a:not(.active) { background: transparent; color: rgba(255,255,255,.85); border: 2px solid rgba(255,255,255,.4); }
  .nav-btns a:not(.active):hover { background: rgba(255,255,255,.15); }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 20px; overflow: hidden;
  }
  .panel-header {
    background: var(--surface2); padding: 10px 16px; font-weight: 600;
    font-size: 13px; color: var(--accent); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .panel-body { padding: 16px; }
  .config-row { display: flex; gap: 16px; align-items: end; flex-wrap: wrap; }
  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .field-group label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
  .field-group select, .field-group input {
    border: 1px solid var(--border); border-radius: 5px; padding: 7px 10px;
    font-family: var(--font); font-size: 13px; color: var(--text); background: var(--surface);
  }
  .field-group input:focus, .field-group select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(26,79,168,.1); }
  input[type=number] { width: 90px; text-align: right; font-family: var(--mono); }

  /* Input table */
  .input-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
  .input-table th {
    padding: 8px 10px; border: 1px solid var(--border); font-weight: 600; text-align: center; white-space: nowrap;
  }
  .input-table th.y-hdr { background: var(--accent2-light); color: var(--accent2); }
  .input-table th.n-hdr { background: #f0f2f8; color: var(--accent); }
  .input-table td { padding: 6px 8px; border: 1px solid var(--border); text-align: center; }
  .input-table td.lbl { font-family: var(--font); font-weight: 500; text-align: left; background: var(--surface2); white-space: nowrap; }
  .input-table td input[type=number] { width: 80px; text-align: right; border: 1px solid var(--border); border-radius: 4px; padding: 4px 6px; font-family: var(--mono); font-size: 12px; }

  /* Timeline cards */
  .tl-section { margin-bottom: 28px; }
  .tl-title {
    font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .tl-title-badge {
    display: inline-block; padding: 3px 10px; border-radius: 5px;
    font-size: 12px; font-weight: 700; color: #fff; background: var(--accent);
  }
  .tl-row {
    display: flex; align-items: stretch; overflow-x: auto; padding-bottom: 4px;
  }
  .tl-arrow {
    display: flex; align-items: center; padding: 0 6px; color: #bbb; font-size: 22px; flex-shrink: 0;
  }
  .tl-card {
    min-width: 155px; max-width: 190px; flex-shrink: 0;
    background: #fff; border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 12px; text-align: center; transition: box-shadow .2s;
  }
  .tl-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); }
  .tl-card.c-prev { border-color: #ccc; background: #f8f9fb; }
  .tl-card.c-danggi { border-color: var(--accent); background: linear-gradient(135deg, #e8eef8, #f0f4fb); }
  .tl-card.c-addtl { border-color: var(--accent2); background: linear-gradient(135deg, #e6f4f0, #f0faf6); }
  .tl-card.c-chug { border-color: var(--orange); background: linear-gradient(135deg, var(--orange-light), #fff8f0); }
  .tl-card.c-missing { border-style: dashed; border-color: #ccc; background: #fafafa; opacity: .55; }
  .tl-card-year { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
  .tl-card-role { margin-bottom: 8px; }
  .tl-card-amount { font-size: 16px; font-weight: 700; font-family: var(--mono); }
  .tl-card-amount.blue { color: var(--accent); }
  .tl-card-amount.green { color: var(--accent2); }
  .tl-card-detail { font-size: 10px; color: var(--text-muted); margin-top: 4px; line-height: 1.5; }
  .tl-card-chug { font-size: 11px; color: var(--warn); font-weight: 600; margin-top: 4px; }
  .tl-card-net { font-size: 12px; font-weight: 700; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; }
  .badge-prev { background: #e9ecef; color: #6c757d; }
  .badge-danggi { background: var(--accent-light); color: var(--accent); }
  .badge-addtl { background: var(--accent2-light); color: var(--accent2); }
  .badge-ok { background: #d4edda; color: #155724; }
  .badge-warn { background: #fff3cd; color: #856404; }
  .badge-danger { background: #f8d7da; color: #721c24; }
  .badge-na { background: #e9ecef; color: #999; }

  /* Progress bar */
  .tl-progress { margin-top: 10px; }
  .progress-bar { height: 26px; background: #e9ecef; border-radius: 13px; overflow: hidden; position: relative; }
  .progress-fill {
    height: 100%; border-radius: 13px; display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 12px; font-family: var(--mono);
    transition: width .3s ease; min-width: fit-content; padding: 0 14px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .progress-fill.has-chug { background: linear-gradient(90deg, var(--orange), #f39c12); }
  .progress-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-align: right; }

  /* Grand summary matrix */
  .matrix { width: 100%; border-collapse: collapse; font-size: 13px; }
  .matrix th {
    background: var(--accent); color: #fff; padding: 10px 12px;
    border: 1px solid #1a4fa8; text-align: center; font-weight: 600;
  }
  .matrix td {
    padding: 10px 12px; border: 1px solid var(--border);
    text-align: center; font-family: var(--mono); font-size: 13px;
  }
  .matrix td.lbl {
    font-family: var(--font); font-weight: 600; text-align: left; background: var(--surface2);
  }
  .matrix .cell-credit { color: var(--accent2); font-weight: 600; }
  .matrix .cell-chug { color: var(--warn); font-size: 11px; }
  .matrix tr.row-total td { background: var(--accent); color: #fff; font-weight: 700; border-color: #1a4fa8; }
  .matrix tr.row-total td.lbl { background: var(--accent); color: #fff; }
  .matrix td.col-total { background: var(--accent-light); font-weight: 700; color: var(--accent); }

  .highlight-box {
    background: var(--accent); color: #fff; border-radius: 10px;
    padding: 16px 24px; margin-top: 16px; text-align: center;
  }
  .highlight-box .big { font-size: 28px; font-weight: 700; font-family: var(--mono); }
  .highlight-box .label { font-size: 12px; opacity: .8; margin-bottom: 4px; }

  @media (max-width: 768px) {
    .container { padding: 12px; }
    .tl-card { min-width: 130px; padding: 10px 8px; }
  }
  @media print { .app-header, .no-print { display: none !important; } body { background: #fff; } }
</style>

    <div class="sub">조세특례제한법 제29조의8 | 다중 시작연도 누적 분석</div>
  </div>
  <div class="nav-btns">
    <a href="index.html">명세서 (현행)</a>

      <button id="axis-toggle" onclick="toggleAxis()" style="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:5px;padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;">축 전환</button>

<footer style="background:#1a2332;color:#8a9bb0;text-align:center;padding:20px 32px;font-size:12px;">
  <span style="color:#fff;font-weight:600;">Made with</span> &#10038;
  <span style="color:#a8c4f0;">김태현 세무사</span> &middot;
  <span style="color:#a8c4f0;">Claude AI</span> |
  <span style="color:#5a6a7e;font-size:11px;">통합고용세액공제 계산기</span>
</footer>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 공제 단가 (만원)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const RATES = {
  '중소': { youth: { metro: 1450, local: 1550 }, normal: { metro: 850, local: 950 }, years: 3 },
  '중견': { youth: { metro: 800, local: 800 }, normal: { metro: 450, local: 450 }, years: 3 },
  '대기업': { youth: { metro: 400, local: 400 }, normal: { metro: 0, local: 0 }, years: 2 }
};

let saved = {};
let axisFlipped = false;

function fmt(n) { return n.toLocaleString('ko-KR'); }
function fmtD(n) { return Number.isInteger(n) ? n.toString() : n.toFixed(2); }
function getCorp() { return document.getElementById('corp-type').value; }
function getFrom() { return +document.getElementById('year-from').value; }
function getTo() { return +document.getElementById('year-to').value; }

function getW(y) {
  const g = id => { const el = document.getElementById(id); return el ? (parseFloat(el.value) || 0) : 0; };
  return { ym: g('w'+y+'-ym'), yl: g('w'+y+'-yl'), nm: g('w'+y+'-nm'), nl: g('w'+y+'-nl') };
}
function totalW(w) { return w.ym + w.yl + w.nm + w.nl; }
function youthW(w) { return w.ym + w.yl; }
function diffW(a, b) { return { ym: a.ym-b.ym, yl: a.yl-b.yl, nm: a.nm-b.nm, nl: a.nl-b.nl }; }
function maxZ(w) { return { ym: Math.max(0,w.ym), yl: Math.max(0,w.yl), nm: Math.max(0,w.nm), nl: Math.max(0,w.nl) }; }

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 당기공제
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function calcDanggi(corp, diff) {
  const r = RATES[corp], inc = maxZ(diff);
  const amt = { ym: inc.ym*r.youth.metro, yl: inc.yl*r.youth.local, nm: inc.nm*r.normal.metro, nl: inc.nl*r.normal.local };
  return { inc, amt, total: amt.ym+amt.yl+amt.nm+amt.nl };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 추가공제 (유지확인)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function calcAddtl(corp, danggiInc, wCheck, wPrev) {
  const r = RATES[corp];
  const kept = maxZ(diffW(wCheck, wPrev));
  const inc = { ym: Math.min(danggiInc.ym,kept.ym), yl: Math.min(danggiInc.yl,kept.yl), nm: Math.min(danggiInc.nm,kept.nm), nl: Math.min(danggiInc.nl,kept.nl) };
  const amt = { ym: inc.ym*r.youth.metro, yl: inc.yl*r.youth.local, nm: inc.nm*r.normal.metro, nl: inc.nl*r.normal.local };
  return { kept, inc, amt, total: amt.ym+amt.yl+amt.nm+amt.nl };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 사후관리 (조특법 시행령 기준)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function calcRegionRaw(yR, nR, yD, nD, yC, nC, yInc) {
  const yDec = Math.max(0, yD-yC), nDec = Math.max(0, nD-nC);
  const tDec = Math.max(0, (yD+nD)-(yC+nC));
  if (tDec<=0 && yDec<=0) return 0;
  if (tDec<=0 && yDec>0) return Math.min(yDec,yInc)*(yR-nR);
  if (yDec>=tDec) { const eff=Math.min(yDec,yInc); return Math.max(0,eff-tDec)*(yR-nR)+tDec*yR; }
  return Math.min(yDec,tDec)*yR + Math.min(nDec,tDec)*nR;
}

function sahuCheck(corp, wD, wC, dInc, mult) {
  const r = RATES[corp], isS = (corp==='중소');
  const yDec = Math.max(0, youthW(wD)-youthW(wC));
  const tDec = Math.max(0, totalW(wD)-totalW(wC));
  let type = 'ok';
  if (tDec>0 && yDec>=tDec) type='case_a';
  else if (tDec>0) type='case_b';
  else if (yDec>0) type='youth_only';
  let raw = 0;
  if (type!=='ok') {
    if (isS) {
      raw = calcRegionRaw(r.youth.metro,r.normal.metro,wD.ym,wD.nm,wC.ym,wC.nm,dInc.ym)
          + calcRegionRaw(r.youth.local,r.normal.local,wD.yl,wD.nl,wC.yl,wC.nl,dInc.yl);
    } else {
      raw = calcRegionRaw(r.youth.metro,r.normal.metro,youthW(wD),totalW(wD)-youthW(wD),youthW(wC),totalW(wC)-youthW(wC),dInc.ym+dInc.yl);
    }
    raw *= mult;
  }
  return { type, raw, yDec, tDec };
}

function sahuBadge(type) {
  switch(type) {
    case 'ok': return '<span class="badge badge-ok">정상</span>';
    case 'youth_only': return '<span class="badge badge-warn">나.청년감소</span>';
    case 'case_a': return '<span class="badge badge-danger">가.㉠</span>';
    case 'case_b': return '<span class="badge badge-danger">가.㉡</span>';
    default: return '';
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// UI 초기화
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initSelectors() {
  const sf = document.getElementById('year-from');
  const st = document.getElementById('year-to');
  for (let y=2019; y<=2026; y++) { const o=document.createElement('option'); o.value=y; o.textContent=y+'년'; if(y===2022) o.selected=true; sf.appendChild(o); }
  for (let y=2020; y<=2027; y++) { const o=document.createElement('option'); o.value=y; o.textContent=y+'년'; if(y===2025) o.selected=true; st.appendChild(o); }
}

function saveVals() { document.querySelectorAll('#input-area input[type=number]').forEach(e => { saved[e.id]=e.value; }); }
function restoreVals() { document.querySelectorAll('#input-area input[type=number]').forEach(e => { if(saved[e.id]!==undefined) e.value=saved[e.id]; }); }

function onSettingsChange() { saveVals(); buildInput(); restoreVals(); recalcAll(); }

function buildInput() {
  const corp=getCorp(), from=getFrom(), to=getTo();
  const isS=(corp==='중소'), hasN=(corp!=='대기업');
  if (to<=from) { document.getElementById('input-area').innerHTML='<p style="color:var(--warn);">종료연도가 시작연도보다 커야 합니다.</p>'; return; }

  const starts = []; for (let y=from+1; y<=to; y++) starts.push(y);
  document.getElementById('info-text').textContent = `입력: ${from}~${to}년 → 시작연도: ${starts.join(', ')}년`;

  let h='<table class="input-table"><thead><tr>';
  h+='<th rowspan="2" style="width:80px;">연도</th>';
  h+=`<th colspan="${isS?2:1}" class="y-hdr">청년등</th>`;
  if(hasN) h+=`<th colspan="${isS?2:1}" class="n-hdr">청년등외</th>`;
  h+='</tr><tr>';
  h+=`<th class="y-hdr">${isS?'수도권':'전체'}</th>`;
  if(isS) h+='<th class="y-hdr">비수도권</th>';
  if(hasN) { h+=`<th class="n-hdr">${isS?'수도권':'전체'}</th>`; if(isS) h+='<th class="n-hdr">비수도권</th>'; }
  h+='</tr></thead><tbody>';

  for (let y=from; y<=to; y++) {
    h+=`<tr><td class="lbl"><strong>${y}년</strong></td>`;
    h+=`<td><input type="number" id="w${y}-ym" step="0.01" value="0" oninput="recalcAll()"></td>`;
    if(isS) h+=`<td><input type="number" id="w${y}-yl" step="0.01" value="0" oninput="recalcAll()"></td>`;
    if(hasN) { h+=`<td><input type="number" id="w${y}-nm" step="0.01" value="0" oninput="recalcAll()"></td>`; if(isS) h+=`<td><input type="number" id="w${y}-nl" step="0.01" value="0" oninput="recalcAll()"></td>`; }
    h+='</tr>';
  }
  h+='</tbody></table>';
  document.getElementById('input-area').innerHTML = h;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 타임라인 계산 (단일 시작연도)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function calcTimeline(startY) {
  const corp=getCorp(), r=RATES[corp], maxY=r.years;
  const from=getFrom(), to=getTo();
  const prev=startY-1;
  const wPrev=getW(prev), wDanggi=getW(startY);
  const diff=diffW(wDanggi, wPrev);
  const danggi=calcDanggi(corp, diff);

  const tl = [];
  tl.push({ year:prev, role:'전기', credit:0, chugjing:0, sahu:null, hasData:true });
  tl.push({ year:startY, role:'당기', credit:danggi.total, chugjing:0, sahu:null, hasData:true, danggi, diff });

  for (let i=1; i<maxY; i++) {
    const cy = startY+i;
    const hasData = cy>=from && cy<=to;

    if (!hasData) {
      tl.push({ year:cy, role:i+'차 추가', credit:0, chugjing:0, sahu:null, hasData:false, idx:i });
      continue;
    }

    const wC=getW(cy);
    const addtl=calcAddtl(corp, danggi.inc, wC, wPrev);
    const credit=addtl.total;
    let sahu, chugjing=0, limit=0, mult=1, prevChug=0;

    if (i===1) {
      mult=1; limit=danggi.total;
      sahu=sahuCheck(corp, wDanggi, wC, danggi.inc, mult);
      chugjing=Math.min(sahu.raw, limit);
    } else if (i===2) {
      const p=tl[tl.length-1];
      const cnt=(danggi.total>0?1:0)+((p.hasData&&p.credit>0)?1:0);
      mult=cnt; limit=danggi.total+(p.hasData?p.credit:0);
      prevChug=p.hasData?p.chugjing:0;
      sahu=sahuCheck(corp, wDanggi, wC, danggi.inc, mult);
      chugjing=Math.min(Math.max(0, sahu.raw-prevChug), limit);
    }

    tl.push({ year:cy, role:i+'차 추가', credit, chugjing, sahu, hasData:true, addtl, idx:i, limit, mult, prevChug });
  }
  return { startY, danggi, tl };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 전체 재계산 & 렌더
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function recalcAll() {
  const from=getFrom(), to=getTo();
  if (to<=from) return;

  const starts=[]; for(let y=from+1; y<=to; y++) starts.push(y);
  const all = starts.map(s => calcTimeline(s));

  renderTimelines(all);
  renderSummary(all, from, to);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 타임라인 카드 렌더링
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderTimelines(all) {
  const corp=getCorp(), maxY=RATES[corp].years;
  let h = '';

  all.forEach(({startY, danggi, tl}) => {
    const totalCredit = tl.reduce((s,t) => s+(t.hasData?t.credit:0), 0);
    const totalChug = tl.reduce((s,t) => s+(t.hasData?t.chugjing:0), 0);
    const net = totalCredit - totalChug;
    const maxPossible = danggi.total * maxY;
    const pct = maxPossible>0 ? Math.min(100, Math.max(5, (net/maxPossible)*100)) : 0;
    const hasAnyCredit = danggi.total > 0;

    h += '<div class="tl-section">';
    h += `<div class="tl-title"><span class="tl-title-badge">${startY}년 시작</span> ${startY}년 vs ${startY-1}년`;
    if (!hasAnyCredit) h += ' <span style="color:var(--text-muted);font-weight:400;">(증가 없음)</span>';
    h += '</div>';

    // Cards
    h += '<div class="tl-row">';
    tl.forEach((item, idx) => {
      if (idx>0) h += '<div class="tl-arrow">&rarr;</div>';

      let cc = 'tl-card ';
      if (!item.hasData) cc += 'c-missing';
      else if (item.role==='전기') cc += 'c-prev';
      else if (item.role==='당기') cc += 'c-danggi';
      else if (item.chugjing>0) cc += 'c-chug';
      else cc += 'c-addtl';

      h += `<div class="${cc}">`;
      h += `<div class="tl-card-year">${item.year}년</div>`;

      if (item.role==='전기') {
        h += '<div class="tl-card-role"><span class="badge badge-prev">전기</span></div>';
        h += '<div class="tl-card-amount" style="color:var(--text-muted);">기준</div>';
        h += `<div class="tl-card-detail">전체 ${fmtD(totalW(getW(item.year)))}명</div>`;
      } else if (!item.hasData) {
        h += `<div class="tl-card-role"><span class="badge badge-na">${item.role}</span></div>`;
        h += '<div class="tl-card-amount" style="color:#ccc;">미입력</div>';
      } else if (item.role==='당기') {
        h += '<div class="tl-card-role"><span class="badge badge-danggi">당기공제</span></div>';
        h += `<div class="tl-card-amount blue">+${fmt(item.credit)}만</div>`;
        const yInc = item.danggi.inc.ym+item.danggi.inc.yl;
        const nInc = item.danggi.inc.nm+item.danggi.inc.nl;
        h += `<div class="tl-card-detail">청년+${fmtD(yInc)} / 비청년+${fmtD(nInc)}</div>`;
      } else {
        h += `<div class="tl-card-role"><span class="badge badge-addtl">${item.role}</span></div>`;
        h += `<div class="tl-card-amount green">+${fmt(item.credit)}만</div>`;
        if (item.sahu) h += `<div style="margin-top:4px;">${sahuBadge(item.sahu.type)}</div>`;
        if (item.chugjing>0) {
          h += `<div class="tl-card-chug">추징 -${fmt(item.chugjing)}만</div>`;
          const n = item.credit - item.chugjing;
          h += `<div class="tl-card-net" style="color:${n>=0?'var(--accent2)':'var(--warn)'};">순 ${fmt(n)}만</div>`;
        }
      }
      h += '</div>';
    });
    h += '</div>';

    // Progress bar
    if (hasAnyCredit) {
      h += '<div class="tl-progress">';
      h += '<div class="progress-bar">';
      h += `<div class="progress-fill ${totalChug>0?'has-chug':''}" style="width:${pct}%">${fmt(net)}만원</div>`;
      h += '</div>';
      h += `<div class="progress-label">누적 순공제 ${fmt(net)}만원`;
      if (totalChug>0) h += ` (공제 ${fmt(totalCredit)}만 - 추징 ${fmt(totalChug)}만)`;
      h += ` / 최대 ${fmt(maxPossible)}만원 (${maxY}년 완전유지)</div>`;
      h += '</div>';
    }

    h += '</div>';
  });

  document.getElementById('timelines-area').innerHTML = h;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 종합 매트릭스
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let lastAll, lastFrom, lastTo;

function toggleAxis() {
  axisFlipped = !axisFlipped;
  document.getElementById('axis-toggle').textContent = axisFlipped ? '행=시작연도 | 축 전환' : '행=과세연도 | 축 전환';
  if (lastAll) renderSummary(lastAll, lastFrom, lastTo);
}

function renderSummary(all, from, to) {
  lastAll=all; lastFrom=from; lastTo=to;

  const matrix = {};
  const startYears = all.map(a => a.startY);
  const calYearSet = new Set();

  all.forEach(({startY, tl}) => {
    tl.forEach(item => {
      if (item.role==='전기' || !item.hasData) return;
      calYearSet.add(item.year);
      if (!matrix[item.year]) matrix[item.year] = {};
      matrix[item.year][startY] = { credit: item.credit, chugjing: item.chugjing };
    });
  });

  const calYears = [...calYearSet].sort();
  let h, grandCredit=0, grandChug=0;

  if (!axisFlipped) {
    // 기본: 행=과세연도, 열=시작연도
    h = '<table class="matrix"><thead><tr>';
    h += '<th>과세연도 \\ 시작</th>';
    startYears.forEach(sy => h += `<th>${sy}년</th>`);
    h += '<th>연 합계</th></tr></thead><tbody>';

    const colC={}, colCh={}; startYears.forEach(sy=>{colC[sy]=0;colCh[sy]=0;});

    calYears.forEach(cy => {
      h+='<tr>'; h+=`<td class="lbl"><strong>${cy}년</strong></td>`;
      let rowC=0, rowCh=0;
      startYears.forEach(sy => {
        const d=matrix[cy]&&matrix[cy][sy];
        if(d){colC[sy]+=d.credit;colCh[sy]+=d.chugjing;rowC+=d.credit;rowCh+=d.chugjing;
          h+='<td>'; if(d.credit>0) h+=`<div class="cell-credit">${fmt(d.credit)}</div>`; else h+='<div style="color:#ccc;">0</div>';
          if(d.chugjing>0) h+=`<div class="cell-chug">(-${fmt(d.chugjing)})</div>`; h+='</td>';
        } else h+='<td></td>';
      });
      grandCredit+=rowC; grandChug+=rowCh;
      h+=`<td class="col-total">${fmt(rowC-rowCh)}`;
      if(rowCh>0) h+=`<div class="cell-chug">(-${fmt(rowCh)})</div>`; h+='</td></tr>';
    });

    h+='<tr class="row-total"><td class="lbl">합계</td>';
    startYears.forEach(sy=>{const n=colC[sy]-colCh[sy]; h+=`<td>${fmt(n)}`;
      if(colCh[sy]>0) h+=`<br><span style="font-size:11px;opacity:.8;">(-${fmt(colCh[sy])})</span>`; h+='</td>';});
    const gn=grandCredit-grandChug; h+=`<td>${fmt(gn)}</td></tr></tbody></table>`;

  } else {
    // 전환: 행=시작연도, 열=과세연도
    h = '<table class="matrix"><thead><tr>';
    h += '<th>시작 \\ 과세연도</th>';
    calYears.forEach(cy => h += `<th>${cy}년</th>`);
    h += '<th>합계</th></tr></thead><tbody>';

    const colC={}, colCh={}; calYears.forEach(cy=>{colC[cy]=0;colCh[cy]=0;});

    startYears.forEach(sy => {
      h+='<tr>'; h+=`<td class="lbl"><strong>${sy}년 시작</strong></td>`;
      let rowC=0, rowCh=0;
      calYears.forEach(cy => {
        const d=matrix[cy]&&matrix[cy][sy];
        if(d){colC[cy]+=d.credit;colCh[cy]+=d.chugjing;rowC+=d.credit;rowCh+=d.chugjing;
          h+='<td>'; if(d.credit>0) h+=`<div class="cell-credit">${fmt(d.credit)}</div>`; else h+='<div style="color:#ccc;">0</div>';
          if(d.chugjing>0) h+=`<div class="cell-chug">(-${fmt(d.chugjing)})</div>`; h+='</td>';
        } else h+='<td></td>';
      });
      grandCredit+=rowC; grandChug+=rowCh;
      h+=`<td class="col-total">${fmt(rowC-rowCh)}`;
      if(rowCh>0) h+=`<div class="cell-chug">(-${fmt(rowCh)})</div>`; h+='</td></tr>';
    });

    h+='<tr class="row-total"><td class="lbl">합계</td>';
    calYears.forEach(cy=>{const n=colC[cy]-colCh[cy]; h+=`<td>${fmt(n)}`;
      if(colCh[cy]>0) h+=`<br><span style="font-size:11px;opacity:.8;">(-${fmt(colCh[cy])})</span>`; h+='</td>';});
    const gn=grandCredit-grandChug; h+=`<td>${fmt(gn)}</td></tr></tbody></table>`;
  }

  // Highlight
  const grandNet = grandCredit - grandChug;
  h += '<div class="highlight-box">';
  h += `<div class="label">입력 기간 내 총 순공제액</div>`;
  h += `<div class="big">${fmt(grandNet)}만원</div>`;
  if (grandChug>0) h += `<div style="font-size:12px;opacity:.8;margin-top:4px;">총 공제 ${fmt(grandCredit)}만 - 총 추징 ${fmt(grandChug)}만</div>`;
  h += '</div>';

  document.getElementById('summary-area').innerHTML = h;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 초기화
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
initSelectors();
buildInput();
recalcAll();
</script>
